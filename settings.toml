# ============================================================
# sing-box_with_xray 配置文件
# 修改后需重启程序生效
# ============================================================

[gh_proxy]
# 是否启用 GitHub 代理（CDN 加速）
# 启用后，下载 sing-box / xray 更新时会通过下方配置的代理地址中转
# 关闭后直接使用 GitHub 官方链接下载
# 可选值: true, false
enabled = true

# GitHub 代理地址，仅在 enabled = true 时生效
# 代理地址会拼接在 GitHub 原始下载链接前面
# 示例: "https://gh-proxy.com/"  → 最终请求: https://gh-proxy.com/https://github.com/...
url = "https://gh-proxy.com/"

[log]
# 日志级别，控制日志输出的详细程度
# 可选值: "debug", "info", "warn", "error"
# debug - 输出所有日志（含调试信息），适合排查问题
# info  - 输出常规运行信息及更高级别日志
# warn  - 仅输出警告和错误
# error - 仅输出错误
level = "debug"

[download]
# 下载更新时的最大重试次数
# 网络不稳定时可适当增大
# 上限为 10
max_retries = 3

# 每次重试之间的等待时间（秒）
# 上限为 30
retry_delay_secs = 2
