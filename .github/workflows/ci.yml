name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          targets: aarch64-pc-windows-msvc
          components: clippy

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - name: Build amd64
        run: cargo build --release

      - name: Build arm64
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64_arm64
          cargo build --release --target aarch64-pc-windows-msvc

      - name: Package amd64
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $dir = "sing-box_with_xray-amd64"
          New-Item -ItemType Directory $dir
          Copy-Item target\release\sing-box_with_xray.exe $dir\
          Copy-Item -Recurse target\release\configs $dir\
          Copy-Item -Recurse target\release\icons $dir\
          Compress-Archive $dir "$dir.zip"

      - name: Package arm64
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $dir = "sing-box_with_xray-arm64"
          New-Item -ItemType Directory $dir
          Copy-Item target\aarch64-pc-windows-msvc\release\sing-box_with_xray.exe $dir\
          Copy-Item -Recurse target\aarch64-pc-windows-msvc\release\configs $dir\
          Copy-Item -Recurse target\aarch64-pc-windows-msvc\release\icons $dir\
          Compress-Archive $dir "$dir.zip"

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sing-box_with_xray-amd64.zip
            sing-box_with_xray-arm64.zip