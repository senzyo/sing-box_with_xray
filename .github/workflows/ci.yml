name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-pc-windows-msvc
          components: clippy

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $ver = cargo metadata --no-deps --format-version 1 2>$null |
            ConvertFrom-Json |
            Select-Object -ExpandProperty packages |
            Where-Object name -eq "ladder" |
            Select-Object -ExpandProperty version
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Verify tag matches version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v',''
          $ver = "${{ steps.version.outputs.version }}"
          if ($tag -ne $ver) {
            Write-Error "Tag version ($tag) does not match Cargo.toml version ($ver)"
            exit 1
          }

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - name: Build amd64
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: cargo build --release

      - name: Build arm64
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64_arm64
          cargo build --release --target aarch64-pc-windows-msvc

      - name: Package amd64
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $dir = "ladder-amd64-v$ver"
          New-Item -ItemType Directory $dir
          Copy-Item target\release\ladder.exe $dir\
          Copy-Item target\release\settings.json $dir\
          Copy-Item -Recurse target\release\configs $dir\
          Copy-Item -Recurse target\release\icons $dir\
          Copy-Item target\release\README.md $dir\
          Copy-Item target\release\LICENSE $dir\
          Compress-Archive $dir "$dir.zip"

      - name: Package arm64
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $dir = "ladder-arm64-v$ver"
          New-Item -ItemType Directory $dir
          Copy-Item target\aarch64-pc-windows-msvc\release\ladder.exe $dir\
          Copy-Item target\aarch64-pc-windows-msvc\release\settings.json $dir\
          Copy-Item -Recurse target\aarch64-pc-windows-msvc\release\configs $dir\
          Copy-Item -Recurse target\aarch64-pc-windows-msvc\release\icons $dir\
          Copy-Item target\aarch64-pc-windows-msvc\release\README.md $dir\
          Copy-Item target\aarch64-pc-windows-msvc\release\LICENSE $dir\
          Compress-Archive $dir "$dir.zip"

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          files: |
            ladder-amd64-v${{ steps.version.outputs.version }}.zip
            ladder-arm64-v${{ steps.version.outputs.version }}.zip